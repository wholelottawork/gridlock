# Build Gridlock Worker (.exe) and attach to a GitHub Release.
#
# Trigger: push a tag like worker-v0.1.0
#   git tag worker-v0.1.0
#   git push origin worker-v0.1.0
#
# Or: Actions → Release Gridlock Worker → Run workflow (creates a draft release).

name: Release Gridlock Worker

on:
  push:
    tags:
      - "worker-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. worker-v0.1.0)"
        required: true
        default: "worker-v0.1.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: gridlock-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gridlock-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Python icon deps
        run: pip install pillow

      - name: Build installer
        run: npm run package
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gridlock-worker-windows
          path: |
            gridlock-worker/release/Gridlock-Worker-Setup-*.exe
            gridlock-worker/release/latest.yml

      - name: Publish GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/worker-v')
        uses: softprops/action-gh-release@v2
        with:
          files: gridlock-worker/release/Gridlock-Worker-Setup-*.exe
          generate_release_notes: true
          draft: false

      - name: Publish GitHub Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Gridlock Worker ${{ github.event.inputs.tag }}
          files: gridlock-worker/release/Gridlock-Worker-Setup-*.exe
          generate_release_notes: true
          draft: true
